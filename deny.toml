[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
    "MIT-0",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"

[advisories]
version = 2
yanked = "deny"
